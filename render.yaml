# Render blueprint for deploying tabby-lite
# Replace placeholder values (DJANGO_SECRET_KEY, TABBY_AUTHENTICATION_TOKEN, TABBY_ROOT)
# A managed Postgres database is created below and its connection string is wired
# into the app's `DATABASE_URL` env var.

services:
  - type: web
    name: maclite26
    env: python
    plan: free
    branch: main
    region: oregon
    buildCommand: pip install poetry && poetry install && poetry run python manage.py migrate && poetry run python manage.py collectstatic
    startCommand: poetry run gunicorn tabby_lite.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: TABBY_HOST
        value: "<REPLACE_WITH_TABBY_HOST>"
        sync: false
      - key: TABBY_TOURNAMENT
        value: "<REPLACE_WITH_TABBY_TOURNAMENT>"
        sync: false
      - key: TABBY_AUTHENTICATION_TOKEN
        value: "<REPLACE_WITH_TABBY_AUTH_TOKEN>"
        sync: false
      - key: DATABASE_URL
        value: "<REPLACE_WITH_DATABASE_URL>"
        sync: false
      - key: REDIS_URL
        value: "<REPLACE_WITH_REDIS_URL>"
        sync: false
      - key: DJANGO_USE_REDIS
        value: "true"
        sync: false


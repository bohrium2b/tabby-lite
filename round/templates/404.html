{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <link href="{% static 'tailwind.css' %}" rel="stylesheet">
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex items-center justify-center">
    <div class="text-center px-6">
        <h1 class="text-6xl font-extrabold text-primary">404</h1>
        <p class="text-xl text-on-secondary-container mt-4">Oops! We can't seem to find the page you're looking for.</p>
        <p class="text-on-secondary-container mt-2 mb-3">It might have been moved, deleted, or perhaps you mistyped the URL.</p>
        <a href="/" class="mt-6 inline-block px-6 py-3 bg-primary-container text-on-primary rounded-xl font-bold hover:opacity-90">Take Me Home</a>
    </div>
</body>
</html>

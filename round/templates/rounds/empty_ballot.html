{% load static %}
<!DOCTYPE html>
<html class="light" lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Ballot</title>
    <link href="{% static 'tailwind.css' %}" rel="stylesheet">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

        .snappy-academic {
            transition: all 200ms cubic-bezier(0.05, 0.7, 0.1, 1.0);
        }
    </style>
</head>

<body class="bg-background text-on-surface font-body min-h-screen flex items-center justify-center">
    {% if error %}
        <div class="absolute top-8 left-1/2 -translate-x-1/2 w-full max-w-lg px-6">
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
                <strong class="font-bold">Error!</strong>
                <span class="block sm:inline">{{ error }}</span>
            </div>
        </div>
    {% endif %}
    <div class="w-full max-w-lg px-6">
        <div class="bg-white rounded-2xl shadow-sm border border-outline-variant/10 p-8">
            <h1 class="text-lg font-bold text-on-surface mb-2">Enter Confidential Ballot Passphrase</h1>
            <p class="text-sm text-on-secondary-container mb-6">Provide the passphrase you received to view the confidential ballot.</p>

            <div class="flex gap-3">
                <input name="passphrase" type="text" placeholder="Enter passphrase" class="flex-1 px-4 py-3 rounded-lg border border-outline-variant/50 focus:outline-none focus:ring-2 focus:ring-primary-container" aria-label="Passphrase">
                <button id="gotoballot" class="px-5 py-3 rounded-lg bg-primary-container text-white font-semibold snappy-academic">Go</button>
            </div>

            <p class="text-xs text-on-secondary-container mt-4">If you don't have a passphrase, contact an administrator.</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const gotoballotButton = document.getElementById('gotoballot');
            gotoballotButton.addEventListener('click', function() {
                const passphrase = document.querySelector('input[name="passphrase"]').value.trim();
                if (!passphrase) {
                    return;
                }
                // redirect to the ballot view; keep existing behavior
                window.location.href = `/ballot/${encodeURIComponent(passphrase)}/`;
            });

            // submit on Enter
            const input = document.querySelector('input[name="passphrase"]');
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    gotoballotButton.click();
                }
            });
        });
    </script>
</body>

</html>

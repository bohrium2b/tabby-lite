{% load static %}
<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <title>Rounds</title>
    <link rel="stylesheet" href="{% static 'tailwind.css' %}">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

        .snappy-academic {
            transition: all 200ms cubic-bezier(0.05, 0.7, 0.1, 1.0);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
</head>

<body>
    <div class="bg-background text-on-surface font-body min-h-screen flex flex-col items-center">

        <div id="main" hx-post="/" hx-trigger="load" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' class="w-full flex flex-col min-h-screen">
            <div class="flex-1 w-full flex items-center justify-center">
                <div id="spinner" class="h-12 w-12 rounded-full border-4 border-gray-300 border-t-blue-600 animate-spin"
                    role="status" aria-label="Loading"
                    style="height:48px;width:48px;border-radius:9999px;border:4px solid #ccc;border-top-color:#1d4ed8;display:block;">
                    <span class="sr-only">Loading</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rounds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body class="container">
    <h1>Rounds</h1>
    <div class="row">
        {% for round in rounds %}
            <div class="col-md-4 col-sm-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">{{ round.name }}</h5>
                        <p class="card-text">Starts at: {{ round.starts_at }}</p>
                        <a href="{{ round.seq }}" class="btn btn-primary">View Details</a>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
    <h1>Registered Teams</h1>
    <div class="row">
        {% for team in teams %}
            <div class="col-md-4 col-sm-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title" title="{{team.long_name}}">{{ team.emoji }} {{ team.short_name }}</h5>
                        <p class="card-text">Institution: {{ team.institution }}</p>
                    </div>
                </div>
            </div>
        {% endfor %}
        <div class="col-md-4 col-sm-6 mb-3">
            <div class="card">
                <div class="card-body d-flex align-items-center justify-content-center">
                    <a href="{% url 'registration' %}" class="btn btn-success">+ Register</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

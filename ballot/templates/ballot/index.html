<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ballot</title>
    <script>
        // Fetch /static/ballot/index.html and replace the current document with it
        fetch("/static/ballot/index.html")
            .then(response => response.text())
            .then(html => {
                document.open();
                document.write(html);
                document.close();
            })
            .catch(error => {
                console.error("Error loading ballot index.html:", error);
            });
    </script>

</head>
<body>
    <div id="root"></div>
</body>
</html>

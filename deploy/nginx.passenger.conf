## Sample Nginx server block using Phusion Passenger for a Django app
## Adjust paths to match where the app is copied inside your Docker image.

server {
    listen 80;
    server_name _;

    # Root should point to the directory containing passenger_wsgi.py
    root /home/app/web/tabby_lite/;

    # Enable Passenger
    passenger_enabled on;
    passenger_app_env production;
    passenger_app_type wsgi;
    passenger_root /home/app/web/tabby_lite/;
    passenger_startup_file tabby_lite/passenger_wsgi.py;

    # If needed, set the python interpreter path inside the container
    # passenger_python /usr/bin/python3.12;

    client_max_body_size 20m;

    # Serve static files directly from STATIC_ROOT
    location /static/ {
        alias /home/app/web/static/;
    }

    # Optional: pass other requests to Passenger (default behaviour)
}
